entity_key_serialization_version: 2
offline_store:
  database: FEAST_OFFLINE_STORE
  db_schema: public
  host: cassandra-postgresql.feast-db
  password: ${FEAST_OFFLINE_STORE_PASSWORD}
  port: 5432
  type: postgres
  user: ${FEAST_OFFLINE_STORE_USER}
online_store:
  hosts:
  - cassandra.feast-db
  keyspace: dognauts_feature_store
  load_balancing:
    load_balancing_policy: DCAwareRoundRobinPolicy
    local_dc: datacenter1
  password: ${FEAST_ONLINE_STORE_PASSWORD}
  port: 9042
  protocol_version: 5
  request_timeout: 300.0
  type: cassandra
  username: ${FEAST_ONLINE_STORE_USER}
project: ${PROJECT_NAME}
provider: local
registry: s3://${S3_BUCKET}/registry.db
